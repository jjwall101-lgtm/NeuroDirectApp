<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>NeuroDirect</title>
  <link rel="stylesheet" href="style.css?v=26">
</head>
<body>
  <main class="content" style="max-width:820px;padding-top:4rem;">
    <section class="hero" style="grid-template-columns:1fr;">
      <div class="brand" style="margin-bottom:1rem;">
        <img src="logo.png?v=26" class="brand-logo" alt="NeuroDirect logo">
        <div>
          <h1>NeuroDirect</h1>
          <p>Choose your app</p>
        </div>
      </div>
      <div class="two-grid">
        <a class="panel" href="teen.html" style="text-decoration:none;color:inherit;">
          <p class="eyebrow">Teen app</p>
          <h2>NeuroDirect Teen</h2>
          <p>Check-ins, planning, calendar, focus tools and private progress.</p>
        </a>
        <a class="panel" href="parent.html" style="text-decoration:none;color:inherit;">
          <p class="eyebrow">Parent app</p>
          <h2>NeuroDirect Parent</h2>
          <p>Family overview, calendar visibility and in-app notifications.</p>
        </a>
      </div>
    </section>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js?v=26").catch(() => {});
    }
  </script>
</body>
</html>
